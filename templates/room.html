{% extends 'base.html' %}
{% load static %}

{% block title %}Meeting Room{% endblock %}

{% block content %}
<div class="container-fluid py-4">
    <div class="row">

        <!-- Main Video Area -->
        <div class="col-lg-9">
            <div class="border rounded p-3 p-lg-4">
                
                <!-- Header -->
                <div class="d-flex justify-content-between align-items-center mb-3">
                    <div>
                        <h2 class="h4 mb-1">Meeting Room</h2>
                        <p class="text-secondary mb-0">Room ID: {{ room_id }}</p>
                    </div>
                    <span class="badge text-bg-dark border">Live</span>
                </div>

                <!-- Video Section -->
                <div class="row g-3">

                    <!-- Local Video -->
                    <div class="col-md-6">
                        <div class="border rounded p-2">
                            <p class="small text-secondary mb-2">You</p>
                            <video
                                id="localVideo"
                                class="w-100 rounded bg-black"
                                autoplay
                                muted
                                playsinline
                            ></video>
                        </div>
                    </div>

                    <!-- Remote Video -->
                    <div class="col-md-6">
                        <div class="border rounded p-2">
                            <p class="small text-secondary mb-2">Remote</p>
                            <video
                                id="remoteVideo"
                                class="w-100 rounded bg-black"
                                autoplay
                                playsinline
                                muted
                            ></video>
                        </div>
                    </div>

                </div>

                <!-- Status -->
                <p id="mediaStatus" class="small text-secondary mt-3 mb-0">
                    Connecting...
                </p>

            </div>
        </div>

        <!-- Sidebar -->
        <div class="col-lg-3">
            <div class="border rounded p-4">
                
                <h4>Participants</h4>
                <ul class="list-unstyled">
                    <li>You</li>
                    <li>Waiting for others...</li>
                </ul>

                <!-- Controls (UI only for now) -->
                <div class="d-grid gap-2 mt-4">
                    <button type="button" class="btn btn-primary">Mic</button>
                    <button type="button" class="btn btn-secondary">Camera</button>
                    <button type="button" class="btn btn-danger">End Call</button>
                </div>

            </div>
        </div>

    </div>
</div>
{% endblock %}

{% block extra_js %}

<!-- ✅ Pass room ID safely -->
<script>
    window.roomConfig = {
        roomId: "{{ room_id|escapejs }}"
    };
</script>

<!-- ✅ Load WebRTC logic -->
<script src="{% static 'js/room.js' %}"></script>

{% endblock %}

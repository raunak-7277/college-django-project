{% load static %}
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}Live Video Call{% endblock %}</title>

    <link rel="stylesheet" href="{% static 'css/style.css' %}">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;800&display=swap" rel="stylesheet">

    <style>
        body {
            font-family: 'Inter', sans-serif;
            background: #0d0a07;
            color: white;
        }

        .glass-nav {
            backdrop-filter: blur(10px);
            background-color: rgba(0, 0, 0, 0.6) !important;
        }

        .cta-btn {
            background: #ff9800;
            border: none;
            padding: 8px 20px;
            border-radius: 30px;
            font-weight: 600;
            color: white;
        }

        .cta-btn:hover {
            background: #e68900;
            color: white;
        }
    </style>

    {% block extra_css %}{% endblock %}
</head>
<body>

    <!-- ===== NAVBAR ===== -->
    <nav class="navbar navbar-expand-lg sticky-top navbar-dark py-3 border-bottom border-secondary glass-nav">
        <div class="container">
            <a class="navbar-brand fw-bold" href="{% url 'home' %}"> VideoCall</a>

            <div class="ms-auto d-flex gap-3 align-items-center">

                {% if user %}
                    <!-- Logged-in state: show username + nav links -->
                    <span class="text-secondary">👤 {{ user.name }}</span>
                    <a href="{% url 'meeting_history' %}?user={{ user.username }}" class="text-white text-decoration-none">History</a>
                    <a href="{% url 'logout' %}" class="btn btn-outline-light btn-sm px-3 rounded-pill">Logout</a>
                {% else %}
                    <!-- Logged-out state -->
                    <a href="{% url 'register' %}" class="text-white text-decoration-none">Register</a>
                    <a href="{% url 'login' %}" class="btn cta-btn">Login</a>
                {% endif %}

            </div>
        </div>
    </nav>

    {% block content %}{% endblock %}

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
    <script src="{% static 'js/main.js' %}"></script>
    {% block extra_js %}{% endblock %}
</body>
</html>

{% extends 'base.html' %}

{% block title %}Create Room{% endblock %}

{% block content %}
<div class="container py-5">
    <h1>Create or Join a Room</h1>

    <div class="mt-4">
        <form method="POST">
         {% csrf_token %}
            <div class="mb-3">
                <label class="form-label">Enter Your Name</label>
                <input type="text" class="form-control" placeholder="Your name">
            </div>

            <div class="mb-3">
                <label class="form-label">Room ID</label>
                <input type="text" class="form-control" placeholder="Enter or generate room id">
            </div>

            <button type="submit" class="btn btn-primary">
                Create Room
            </button>
        </form>
    </div>
</div>
{% endblock %}

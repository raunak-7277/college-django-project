{% extends 'base.html' %}

{% block title %}Login{% endblock %}

{% block content %}
{% comment %} <div class="container py-5">
    <div class="mx-auto" style="max-width: 400px;">
        <h2 class="mb-4">Login</h2>

        <form>
            <div class="mb-3">
                <label class="form-label">Email</label>
                <input type="email" class="form-control" placeholder="Enter email">
            </div>

            <div class="mb-3">
                <label class="form-label">Password</label>
                <input type="password" class="form-control" placeholder="Enter password">
            </div>

            <button type="submit" class="btn btn-primary w-100">
                Login
            </button>
        </form>
    </div>
</div> {% endcomment %}
<div class="container-fluid main-bg">
  <div class="row justify-content-center align-items-center vh-100">

    <div class="col-lg-8 col-md-10">
      <div class="card login-card">

        <div class="row g-0">

          <!-- LEFT SIDE -->
          <div class="col-md-6 left-box text-center">
            <img src="{% static 'images/login.svg' %}" class="img-fluid illustration">
            <p class="info-text">
              Lorem ipsum dolor sit amet, consectetur adipiscing elit.
            </p>
          </div>

          <!-- RIGHT SIDE -->
          <div class="col-md-6 right-box">

            <div class="form-container">

              <span class="welcome-tag">Welcome Back</span>

              <h4 class="title">Login your account</h4>

              <form method="POST">
                {% csrf_token %}

                <div class="mb-4">
                  <input type="text" name="username" class="form-control custom-input" placeholder="Username">
                </div>

                <div class="mb-4">
                  <input type="password" name="password" class="form-control custom-input" placeholder="Password">
                </div>

                <button class="btn login-btn w-100">Login</button>

                <div class="links">
                  <a href="#">Create Account</a>
                  <a href="#">Forgot Password?</a>
                </div>

              </form>

            </div>

          </div>

        </div>

      </div>
    </div>

  </div>
</div>
{% endblock %}

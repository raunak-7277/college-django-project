{% extends 'base.html' %}

{% block title %}Register{% endblock %}

{% block extra_css %}
<style>
{% comment %} Reset  {% endcomment %}
body {
    margin: 0;
    padding: 0;
    font-family: 'Segoe UI', sans-serif;
}

{% comment %}  Background Gradient  {% endcomment %}
.main-container {
    height: 100vh;
    display: flex;
    justify-content: center;
    align-items: center;
    background: linear-gradient(180deg, #7b3dbb, #3bb2c7);
}

{% comment %} Form Box  {% endcomment %}
.form-box {
    background: #2c2c6c;
    padding: 35px;
    border-radius: 12px;
    width: 360px;
    box-shadow: 0 10px 25px rgba(0,0,0,0.4);
    transition: 0.3s;
}

{% comment %} Hover effect  {% endcomment %}
.form-box:hover {
    transform: translateY(-5px);
}

{% comment %} Title  {% endcomment %}
.form-title {
    color: #fff;
    text-align: center;
    margin-bottom: 20px;
    font-weight: 600;
}

{% comment %} Inputs  {% endcomment %}
.form-control {
    border-radius: 8px;
    padding: 12px;
    border: none;
    outline: none;
    transition: 0.3s;
}

{% comment %} Input focus effect  {% endcomment %}
.form-control:focus {
    box-shadow: 0 0 5px #6c63ff;
    border: 1px solid #6c63ff;
}

{% comment %} Checkbox text  {% endcomment %}
.form-check-label {
    color: #ddd;
}

{% comment %} Button  {% endcomment %}
.register-btn {
    background: linear-gradient(45deg, #4CAF50, #2ecc71);
    color: white;
    border-radius: 8px;
    font-weight: bold;
    padding: 10px;
    border: none;
    transition: 0.3s;
}

{% comment %} Button hover  {% endcomment %}
.register-btn:hover {
    background: linear-gradient(45deg, #45a049, #27ae60);
    transform: scale(1.03);
}

{% comment %} Error Text {% endcomment %}
.error {
    color: #ff6b6b;
    font-size: 12px;
    margin-left: 5px;
}

{% comment %} Error Border  {% endcomment %}
input.error-border {
    border: 2px solid #ff6b6b;
}

{% comment %} Responsive (Mobile) {% endcomment %}
@media (max-width: 400px) {
    .form-box {
        width: 90%;
        padding: 25px;
    }
}
</style>
{% endblock %}

{% block content %}
{% comment %} <div class="container py-5">
    <div class="mx-auto" style="max-width: 450px;">
        <h2 class="mb-4">Create Account</h2>

        <form>
            <div class="mb-3">
                <label class="form-label">Full Name</label>
                <input type="text" class="form-control" placeholder="Enter full name">
            </div>

            <div class="mb-3">
                <label class="form-label">Email</label>
                <input type="email" class="form-control" placeholder="Enter email">
            </div>

            <div class="mb-3">
                <label class="form-label">Password</label>
                <input type="password" class="form-control" placeholder="Create password">
            </div>

            <button type="submit" class="btn btn-primary w-100">
                Register
            </button>
        </form>
    </div>
</div> {% endcomment %}
<div class="main-container">
    <div class="form-box">

        <h2 class="form-title">Registration Form</h2>

        <form id="registerForm" onsubmit="return validateForm()">

            <!-- First Name -->
            <input type="text" id="firstName" placeholder="First name" class="form-control mb-1">
            <small class="error" id="firstNameError"></small>

            <!-- Last Name -->
            <input type="text" id="lastName" placeholder="Last name" class="form-control mb-1 mt-2">
            <small class="error" id="lastNameError"></small>

            <!-- Email -->
            <input type="email" id="email" placeholder="Email" class="form-control mb-1 mt-2">
            <small class="error" id="emailError"></small>

            <!-- Password -->
            <input type="password" id="password" placeholder="Password" class="form-control mb-1 mt-2">
            <small class="error" id="passwordError"></small>

            <!-- Checkboxes -->
            <div class="form-check mt-3">
                <input class="form-check-input" type="checkbox" id="check1">
                <label class="form-check-label small">
                    Accept terms & conditions
                </label>
            </div>
            <small class="error" id="checkError"></small>

            <button class="btn register-btn w-100 mt-3">Register</button>

        </form>

    </div>
</div>

<!-- JS -->
<script>
function validateForm() {

    let isValid = true;

    // Inputs
    let firstName = document.getElementById("firstName");
    let lastName = document.getElementById("lastName");
    let email = document.getElementById("email");
    let password = document.getElementById("password");
    let check1 = document.getElementById("check1");

    // Errors
    let firstNameError = document.getElementById("firstNameError");
    let lastNameError = document.getElementById("lastNameError");
    let emailError = document.getElementById("emailError");
    let passwordError = document.getElementById("passwordError");
    let checkError = document.getElementById("checkError");

    // Reset
    firstNameError.innerText = "";
    lastNameError.innerText = "";
    emailError.innerText = "";
    passwordError.innerText = "";
    checkError.innerText = "";

    // First Name
    if (firstName.value.trim() === "") {
        firstNameError.innerText = "First name is required";
        isValid = false;
    }

    // Last Name
    if (lastName.value.trim() === "") {
        lastNameError.innerText = "Last name is required";
        isValid = false;
    }

    // Email
    let emailPattern = /^[^ ]+@[^ ]+\.[a-z]{2,3}$/;
    if (email.value.trim() === "") {
        emailError.innerText = "Email is required";
        isValid = false;
    } else if (!email.value.match(emailPattern)) {
        emailError.innerText = "Enter valid email";
        isValid = false;
    }

    // Password
    if (password.value.trim() === "") {
        passwordError.innerText = "Password is required";
        isValid = false;
    } else if (password.value.length < 6) {
        passwordError.innerText = "Minimum 6 characters required";
        isValid = false;
    }

    // Checkbox
    if (!check1.checked) {
        checkError.innerText = "You must accept terms";
        isValid = false;
    }

    return isValid;
}
</script>
{% endblock %}

{% extends 'base.html' %}
{% load static %}

{% block title %}Register{% endblock %}

{% block extra_css %}
<style>
    .auth-card {
        background: rgba(255,255,255,0.05);
        border: 1px solid rgba(255,255,255,0.1);
        border-radius: 16px;
        padding: 2rem;
        max-width: 420px;
        width: 100%;
    }

    .form-control {
        background: rgba(255,255,255,0.08);
        border: 1px solid rgba(255,255,255,0.15);
        color: white;
        border-radius: 8px;
    }

    .form-control:focus {
        background: rgba(255,255,255,0.12);
        border-color: #ff9800;
        color: white;
        box-shadow: 0 0 0 0.2rem rgba(255,152,0,0.25);
    }

    .form-control::placeholder {
        color: rgba(255,255,255,0.4);
    }

    .btn-register {
        background: #ff9800;
        border: none;
        font-weight: 600;
        border-radius: 8px;
        padding: 10px;
    }

    .btn-register:hover {
        background: #e68900;
        color: white;
    }
</style>
{% endblock %}

{% block content %}
<div class="d-flex justify-content-center align-items-center" style="min-height: calc(100vh - 80px);">
    <div class="auth-card">

        <h3 class="fw-bold mb-1">Create Account</h3>
        <p class="text-secondary mb-4">Join and start video calling</p>

        <!-- Error Message -->
        {% if error %}
        <div class="alert alert-danger py-2" role="alert">
            ⚠️ {{ error }}
        </div>
        {% endif %}

        <form method="POST">
            {% csrf_token %}

            <!-- Full Name -->
            <div class="mb-3">
                <label class="form-label text-secondary small">Full Name</label>
                <input
                    type="text"
                    name="name"
                    class="form-control"
                    placeholder="Enter your full name"
                    value="{{ name|default:'' }}"
                    required
                >
            </div>

            <!-- Username -->
            <div class="mb-3">
                <label class="form-label text-secondary small">Username</label>
                <input
                    type="text"
                    name="username"
                    class="form-control"
                    placeholder="Choose a username (min 3 chars)"
                    value="{{ username|default:'' }}"
                    required
                >
            </div>

            <!-- Password -->
            <div class="mb-3">
                <label class="form-label text-secondary small">Password</label>
                <input
                    type="password"
                    name="password"
                    class="form-control"
                    placeholder="Choose a password (min 4 chars)"
                    required
                >
            </div>

            <!-- Confirm Password -->
            <div class="mb-4">
                <label class="form-label text-secondary small">Confirm Password</label>
                <input
                    type="password"
                    name="confirm_password"
                    class="form-control"
                    placeholder="Re-enter your password"
                    required
                >
            </div>

            <button type="submit" class="btn btn-register text-white w-100">
                Create Account →
            </button>
        </form>

        <p class="text-center text-secondary mt-3 mb-0 small">
            Already have an account?
            <a href="{% url 'login' %}" class="text-warning text-decoration-none">Login here</a>
        </p>

    </div>
</div>
{% endblock %}
